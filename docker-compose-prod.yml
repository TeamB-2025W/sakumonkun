version: '3.8'

services:
  app:
    container_name: sakumonkun-django
    build:
      context: ./project
      dockerfile: Dockerfile
    volumes:
      - static_volume:/code/static
    env_file: .env.prod
    command: gunicorn project.wsgi:application --bind 0.0.0.0:8000

  nginx:
    container_name: sakumonkun-nginx
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/code/static
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  static_volume:
