version: '3.8'

services:
  app:
    container_name: sakumonkun-django
    build:
      context: ./project
      dockerfile: Dockerfile
    env_file: .env.prod
    volumes:
      - ./volumes/static:/code/static
      - .env.prod:/code/.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=project.settings
    command: >
      sh -c "apt-get update && apt-get install -y default-mysql-client && 
             gunicorn project.wsgi:application --bind 0.0.0.0:8000"


  nginx:
    container_name: sakumonkun-nginx
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volumes/static:/code/static
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  static_volume:
