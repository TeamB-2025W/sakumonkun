{% extends 'app/header_base.html' %}

{% block content %}
<h2 class="profile-edit">プロフィール編集</h2>

    {% csrf_token %}
    {{ form.as_p }}

</form>

<h3 class="profile-edit">パスワード変更</h3>
<div class="profile-edit">
    <a href="{% url 'accounts:change_password' %}">パスワードを変更する</a>
</div>
{% endblock %}
