<div class="modal hidden">
  <h1>テストを削除します</h1>
  <p>よろしいですか？</p>
  <label>テスト名</label>
  <p id="test-title-viewer">テスト名を表示します</p>
  <div class="flex">
    <form method="post" id="delete-form">
      {% csrf_token %}
    </form>
    <button form="delete-form" type="submit">削除する</button>
    <button id="close-modal-button" onclick="toggleModal()">戻る</button>
  </div>
</div>
