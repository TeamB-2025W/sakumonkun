{% extends 'app/header_base.html' %}
{% block title %}テスト作成成功{% endblock %}

{% block content %}
<div class="creation-successful">
  <h1 class=>テスト作成を完了しました。</h1>
  <p>テストの名前</p>
  <p>{{ test.title }}</p>
  <label for="test-url">テストのURL</label>
  <div class="flex">
    <input class="url_get" value="{{ test.signed_id }}">
    <button class="copy_button">Copy</button>
  </div>
</div>
<div class="creation-successful">
  <a href="{% url 'app:home' %}">ホームに戻る</a>
</div>
{% endblock %}

{% load static %}
{% block extra_js %}
<script src="{% static 'js/detail.js' %}"></script>
{% endblock %}
