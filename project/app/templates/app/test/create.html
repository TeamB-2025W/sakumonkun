{% extends 'app/header_base.html' %}
{% block title %}テスト作成{% endblock %}

{% block content %}
<form>
  <label for="test-title">テストタイトル</label>

</div>
<form>
  <ol>
    <li>
      <h3>問題１</h3>
      <input placeholder="問題文">
  
      <div>
        <p>選択肢</p>
        <p>正答</p>
      </div>
      <fieldset>
        <div>
          <label>１</label>
          <input>
          <input type="radio" name="correct">
        </div>
        <div>
          <label>２</label>
          <input>
          <input type="radio" name="correct">
        </div>
        <div>
          <label>３</label>
          <input>
          <input type="radio" name="correct">
        </div>
        <div>
          <label>４</label>
          <input>
          <input type="radio" name="correct">
        </div>
      </fieldset>
  
      <label for="commentary">解説</label>
      <input for="commentary" placeholder="解説文">
    </li>
  </ol>
</form>

<button>
  ＋問題を追加する
</button>

<button>
  問題作成を完了する
</button>
<a href="{% url 'app:creation_successful' %}">作成完了ページ臨時表示</a>
{% endblock %}
