{% extends 'app/header_base.html' %}
{% block title %}テスト作成{% endblock %}

{% block content %}
<form id="create-test">
  <label for="test-title">テストタイトル</label>
  <input id="test-title">
</form>

<ol id="questions">
  <li id="question">
    <h3>問題1</h3>
    <textarea placeholder="問題文" form="create-test" rows="5" cols="96"></textarea>

    <label class="flex choiceies">
      <p>選択肢</p>
      <p>正答</p>
    </label>
    <ol class="choiceies">
      <li class="flex">
        <label>1</label>
        <input>
        <input type="radio" name="correct-1">
      </li>
      <li class="flex">
        <label>2</label>
        <input>
        <input type="radio" name="correct-1">
      </li>
      <li class="flex">
        <label>3</label>
        <input>
        <input type="radio" name="correct-1">
      </li>
      <li class="flex">
        <label>4</label>
        <input>
        <input type="radio" name="correct-1">
      </li>
    </ol>

    <label for="commentary" class="commentary">解説</label>
    <textarea class="commentary" id="commentary" placeholder="解説文" rows="7" cols="96"></textarea>
  </li>
</ol>

<div class="button-area">
  <button id="addQuestionButton">
    ＋問題を追加する
  </button>
</div>
<div class="button-area">
  <button id="removeQuestionButton">
    ー１番下の問題を削除する
  </button>
</div>
<div class="button-area">
  <button type="submit">
    問題作成を完了する
  </button>
</div>
{% endblock %}

{% load static %}
{% block extra_js %}
<script src="{% static 'js/create.js' %}"></script>
{% endblock %}
